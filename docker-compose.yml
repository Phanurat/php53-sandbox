version: '3.8'

services:
  # PHP-FPM v5.3 Sandbox (Build เองในเครื่อง)
  php:
    build: ./php
    container_name: sandbox-php53
    volumes:
      - ./src:/var/www/html
    # เขียนทับไฟล์ php.ini ข้างในระบบ เพื่อเปิดช่องโหว่ RFI และตั้งค่า fix_pathinfo ล่อเป้าไว้
    entrypoint: >
      sh -c "echo 'allow_url_include = On' >> /etc/php5/fpm/php.ini &&
             echo 'cgi.fix_pathinfo = 1' >> /etc/php5/fpm/php.ini &&
             php5-fpm -F"
    networks:
      - sandbox-net

  # Nginx Web Server Container
  nginx:
    image: nginx:1.21-alpine
    container_name: sandbox-nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - sandbox-net

networks:
  sandbox-net:
    driver: bridge