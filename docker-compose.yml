version: '3.8'

services:
  # PHP-FPM v5.3.29 Container
  php:
    image: preparedness/php-fpm:5.3
    container_name: sandbox-php53
    volumes:
      - ./src:/var/www/html
    # ปรับค่า php.ini ภายใน Container เพื่อเปิดช่องโหว่ RFI และเปิด fix_pathinfo ล่อเป้าไว้ทดสอบ
    command: >
      sh -c "echo 'allow_url_include = On' >> /usr/local/etc/php.ini &&
             echo 'cgi.fix_pathinfo = 1' >> /usr/local/etc/php.ini &&
             php-fpm"
    networks:
      - sandbox-net

  # Nginx Web Server Container
  nginx:
    image: nginx:1.21-alpine
    container_name: sandbox-nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - sandbox-net

networks:
  sandbox-net:
    driver: bridge